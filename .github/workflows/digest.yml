name: AI Builders Digest

on:
  schedule:
    # 每天 UTC 01:00 = 北京时间 09:00（周一到周五）
    - cron: '0 1 * * 1-5'
    # 每周六 UTC 01:00 = 北京时间 09:00
    - cron: '0 1 * * 6'

  # 支持手动触发（/daily 和 /weekly 指令通过 Cloudflare Worker 调用）
  workflow_dispatch:
    inputs:
      mode:
        description: 'daily or weekly'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install follow-builders skill
        run: |
          git clone https://github.com/zarazhangrui/follow-builders.git /tmp/follow-builders
          cd /tmp/follow-builders/scripts && npm install

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Determine mode
        id: mode
        run: |
          # workflow_dispatch 用输入参数，schedule 根据星期判断
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%u)" = "6" ]; then
            echo "mode=weekly" >> $GITHUB_OUTPUT
          else
            echo "mode=daily" >> $GITHUB_OUTPUT
          fi

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          FOLLOW_BUILDERS_DIR: /tmp/follow-builders/scripts
          DIGEST_MODE: ${{ steps.mode.outputs.mode }}
        run: node index.js
